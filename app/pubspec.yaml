  dartz: ^0.10.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
